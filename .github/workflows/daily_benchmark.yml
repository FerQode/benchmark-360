# .github/workflows/daily_benchmark.yml
# ─────────────────────────────────────────────────────────────
# Benchmark 360 — Ejecucion diaria automatizada
# Se ejecuta todos los dias a las 06:00 AM (hora Ecuador, UTC-5)
# Tambien se puede disparar manualmente desde GitHub
# ─────────────────────────────────────────────────────────────

name: "Benchmark 360 - Daily Pipeline"

on:
  schedule:
    # 11:00 UTC = 06:00 AM Ecuador (UTC-5)
    - cron: "0 11 * * *"

  # Permitir ejecucion manual desde la UI de GitHub
  workflow_dispatch:

  # Ejecutar tambien en push a main (para validar que funciona)
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/**"

env:
  PYTHON_VERSION: "3.12"

jobs:
  benchmark-pipeline:
    name: "Extraer, Procesar y Analizar"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout del codigo ────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # ── 2. Instalar Python + uv ──────────────────────────
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar uv (package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # ── 3. Instalar dependencias ──────────────────────────
      - name: Instalar dependencias del proyecto
        run: |
          uv pip install --system -e ".[dev]"
          playwright install chromium --with-deps

      # ── 4. Ejecutar pipeline principal ────────────────────
      - name: Ejecutar pipeline de scraping + LLM
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== Ejecutando pipeline principal ==="
          python run_pipeline.py || echo "Pipeline principal fallo, usando demo dataset"
          
          # Plan B: Si el pipeline falla, generar datos demo
          if [ ! -f "data/output/benchmark_industria.parquet" ]; then
            echo "=== Generando dataset demo ==="
            python scripts/build_demo_dataset.py
          fi

      # ── 5. Enriquecer con ML ──────────────────────────────
      - name: Aplicar capa ML (etiquetas + clustering + alertas)
        run: |
          echo "=== Aplicando ML: StrategicLabeler + KMeans + Alertas ==="
          python scripts/enrich_and_export.py

      # ── 6. Generar notebook ───────────────────────────────
      - name: Generar notebook de analisis
        run: |
          echo "=== Generando notebook ==="
          python scripts/generate_notebook.py

      # ── 7. Ejecutar tests ─────────────────────────────────
      - name: Ejecutar suite de tests
        run: |
          python -m pytest tests/ -v --no-cov --disable-warnings

      # ── 8. Subir artefactos ───────────────────────────────
      - name: Subir Parquet como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-industria-${{ github.run_number }}
          path: |
            data/output/benchmark_industria.parquet
            data/output/competitive_alerts.csv
            data/output/charts/*.png
            benchmark_industria_notebook.ipynb
          retention-days: 90

      # ── 9. Resumen en el log de GitHub ────────────────────
      - name: Resumen de ejecucion
        run: |
          echo "========================================="
          echo "  BENCHMARK 360 — Ejecucion completada"
          echo "========================================="
          python -c "
          import pandas as pd
          df = pd.read_parquet('data/output/benchmark_industria.parquet')
          print(f'  Registros: {len(df)}')
          print(f'  ISPs:      {df[\"marca\"].nunique()}')
          print(f'  Columnas:  {len(df.columns)}')
          print(f'  Fecha:     {df[\"fecha\"].max()}')
          "
          echo "========================================="
